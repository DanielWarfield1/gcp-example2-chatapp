<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }

    /* Auth */
    #auth { background: white; padding: 2rem; border-radius: 8px; width: 320px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    #auth h1 { margin-bottom: 1.5rem; font-size: 1.25rem; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 0.5rem; border: 1px solid #ddd; background: none; cursor: pointer; border-radius: 4px; }
    .tab.active { background: #1a73e8; color: white; border-color: #1a73e8; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; color: #555; }
    .form-group input { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
    .btn { width: 100%; padding: 0.6rem; background: #1a73e8; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    .btn:hover { background: #1558b0; }
    .error { color: #d32f2f; font-size: 0.85rem; margin-top: 0.75rem; }

    /* App */
    #app { display: none; width: 100vw; height: 100vh; flex-direction: row; }
    #sidebar { width: 260px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    #sidebar-header { padding: 1rem; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; }
    #sidebar-header span { font-weight: bold; }
    #logout-btn { font-size: 0.8rem; color: #888; background: none; border: none; cursor: pointer; }
    #room-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .room-item { padding: 0.6rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
    .room-item:hover { background: #f0f2f5; }
    .room-item.active { background: #e8f0fe; color: #1a73e8; font-weight: 500; }
    #new-room { padding: 0.75rem; border-top: 1px solid #e0e0e0; display: flex; gap: 0.5rem; }
    #new-room input { flex: 1; padding: 0.4rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
    #new-room button { padding: 0.4rem 0.75rem; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }

    /* Chat */
    #chat { flex: 1; display: flex; flex-direction: column; }
    #chat-header { padding: 1rem 1.25rem; border-bottom: 1px solid #e0e0e0; background: white; font-weight: bold; }
    #messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .message { background: white; padding: 0.6rem 0.85rem; border-radius: 8px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .message .sender { font-size: 0.75rem; font-weight: bold; color: #1a73e8; margin-bottom: 0.2rem; }
    .message.mine { align-self: flex-end; background: #e8f0fe; }
    .message.mine .sender { color: #555; }
    #send-bar { padding: 0.75rem 1rem; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 0.75rem; }
    #send-bar input { flex: 1; padding: 0.6rem; border: 1px solid #ddd; border-radius: 20px; font-size: 0.95rem; outline: none; }
    #send-bar button { padding: 0.6rem 1.25rem; background: #1a73e8; color: white; border: none; border-radius: 20px; cursor: pointer; }
    #no-room { flex: 1; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 1.1rem; }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth">
  <h1>Chat App</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('register')">Register</button>
  </div>
  <div id="login-form">
    <div class="form-group"><label>Username</label><input id="login-username" type="text"></div>
    <div class="form-group"><label>Password</label><input id="login-password" type="password"></div>
    <button class="btn" onclick="login()">Login</button>
  </div>
  <div id="register-form" style="display:none">
    <div class="form-group"><label>Username</label><input id="reg-username" type="text"></div>
    <div class="form-group"><label>Password</label><input id="reg-password" type="password"></div>
    <button class="btn" onclick="register()">Register</button>
  </div>
  <div id="auth-error" class="error"></div>
</div>

<!-- App Screen -->
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <span id="current-user"></span>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div id="room-list"></div>
    <div id="new-room">
      <input id="new-room-name" type="text" placeholder="New room...">
      <button onclick="createRoom()">+</button>
    </div>
  </div>
  <div id="chat">
    <div id="no-room">Select a room to start chatting</div>
    <div id="chat-content" style="display:none; flex:1; flex-direction:column; display:none">
      <div id="chat-header"></div>
      <div id="messages"></div>
      <div id="send-bar">
        <input id="message-input" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
  let token = null;
  let username = null;
  let currentRoom = null;
  let pollInterval = null;

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab')[tab === 'login' ? 0 : 1].classList.add('active');
    document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('auth-error').textContent = '';
  }

  async function login() {
    const u = document.getElementById('login-username').value;
    const p = document.getElementById('login-password').value;
    const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
    const data = await res.json();
    if (!res.ok) { document.getElementById('auth-error').textContent = data.detail; return; }
    token = data.token;
    username = u;
    showApp();
  }

  async function register() {
    const u = document.getElementById('reg-username').value;
    const p = document.getElementById('reg-password').value;
    const res = await fetch('/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
    const data = await res.json();
    if (!res.ok) { document.getElementById('auth-error').textContent = data.detail; return; }
    document.getElementById('reg-username').value = '';
    document.getElementById('reg-password').value = '';
    switchTab('login');
    document.getElementById('auth-error').style.color = 'green';
    document.getElementById('auth-error').textContent = 'Registered! Please log in.';
  }

  function logout() {
    token = null; username = null; currentRoom = null;
    clearInterval(pollInterval);
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth').style.display = '';
  }

  function showApp() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('current-user').textContent = username;
    loadRooms();
  }

  async function loadRooms() {
    const res = await fetch('/rooms');
    const rooms = await res.json();
    const list = document.getElementById('room-list');
    list.innerHTML = '';
    rooms.forEach(room => {
      const el = document.createElement('div');
      el.className = 'room-item' + (currentRoom?.room_id === room.room_id ? ' active' : '');
      el.textContent = room.name;
      el.onclick = () => selectRoom(room);
      list.appendChild(el);
    });
  }

  async function createRoom() {
    const name = document.getElementById('new-room-name').value.trim();
    if (!name) return;
    await fetch('/rooms', { method: 'POST', headers: {'Content-Type': 'application/json', 'authorization': `Bearer ${token}`}, body: JSON.stringify({name}) });
    document.getElementById('new-room-name').value = '';
    loadRooms();
  }

  function selectRoom(room) {
    currentRoom = room;
    document.getElementById('no-room').style.display = 'none';
    const content = document.getElementById('chat-content');
    content.style.display = 'flex';
    document.getElementById('chat-header').textContent = room.name;
    loadRooms();
    loadMessages();
    clearInterval(pollInterval);
    pollInterval = setInterval(loadMessages, 3000);
  }

  async function loadMessages() {
    if (!currentRoom) return;
    const res = await fetch(`/messages/${currentRoom.room_id}`);
    const msgs = await res.json();
    const el = document.getElementById('messages');
    el.innerHTML = '';
    msgs.forEach(msg => {
      const div = document.createElement('div');
      div.className = 'message' + (msg.username === username ? ' mine' : '');
      div.innerHTML = `<div class="sender">${msg.username}</div><div>${msg.message}</div>`;
      el.appendChild(div);
    });
    el.scrollTop = el.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('message-input');
    const message = input.value.trim();
    if (!message || !currentRoom) return;
    input.value = '';
    await fetch('/messages', { method: 'POST', headers: {'Content-Type': 'application/json', 'authorization': `Bearer ${token}`}, body: JSON.stringify({room_id: currentRoom.room_id, message}) });
    loadMessages();
  }
</script>
</body>
</html>
